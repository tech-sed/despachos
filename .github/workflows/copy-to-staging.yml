name: Sincronizar producción → staging

on:
  schedule:
    # 3:00am Argentina (UTC-3) = 6:00am UTC
    - cron: '0 6 * * *'
    # 12:00pm Argentina (UTC-3) = 3:00pm UTC
    - cron: '0 15 * * *'
  # También permite correrlo manualmente desde GitHub Actions
  workflow_dispatch:

jobs:
  copy-to-staging:
    name: Copiar datos a staging
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar copia producción → staging
        run: node scripts/copy-to-staging.mjs
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          STAGING_REF: ${{ secrets.STAGING_REF }}
          PROD_SUPABASE_URL: ${{ secrets.PROD_SUPABASE_URL }}
          PROD_SERVICE_KEY: ${{ secrets.PROD_SERVICE_KEY }}
          STAGING_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          STAGING_SERVICE_KEY: ${{ secrets.STAGING_SERVICE_KEY }}
